name: CI Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ciclope-ci
          cache-environment: true
          create-args: >-
            python=3.10
            pip
            numpy>=1.20,<2
            meshio>=5,<6
            pymcubes
            scipy
            py-opencv
            scikit-image
            pypng
            tqdm
            matplotlib
            tifffile
            h5py
            pygalmesh>=0.10.6
            -c conda-forge

      - name: Install ciclope
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run test suite
        working-directory: test
        run: python -m unittest -v test_ciclope.run_tests
